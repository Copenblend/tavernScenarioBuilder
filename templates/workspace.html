<div class="tsb-header">
    <div class="tsb-header-title">
        <i class="fa-solid fa-hat-wizard"></i>
        <span>Tavern Scenario Builder</span>
    </div>
    <button class="tsb-close-btn menu_button" title="Close">
        <i class="fa-solid fa-xmark"></i>
    </button>
</div>

<div class="tsb-body">
    <div class="tsb-workspace">
        <div class="tsb-tab-bar">
            <!-- Tab buttons rendered by workspace.js -->
        </div>
        <div class="tsb-tab-content">
            <!-- Step content rendered by workspace.js -->
        </div>
    </div>

    <div class="tsb-split-handle" title="Drag to resize">
        <div class="tsb-split-handle-grip"></div>
    </div>

    <div class="tsb-entries">
        <div class="tsb-entries-header">
            <i class="fa-solid fa-book-open"></i>
            <span>Entries</span>
        </div>
        <div class="tsb-entries-content">
            <!-- Accordion entries rendered by entries.js -->
        </div>
    </div>
</div>
